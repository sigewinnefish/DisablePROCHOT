name: build

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: apt install
      working-directory: ${{ github.workspace }}
      run: sudo apt install gnu-efi binutils -y

    - name: configure
      working-directory: ${{ github.workspace }}
      run: ./build.sh
      
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v5.0.0
      with:
        path: ${{ github.workspace }}/DisablePROCHOT.efi
